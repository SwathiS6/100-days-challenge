<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Todo List</title>
    <link rel="stylesheet" href="todoo.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <!-- Animated Rainbow Stars -->
    <canvas id="starCanvas"></canvas>
<!-- <i class="fa-notdog fa-solid fa-magnifying-glass"></i> -->
    <div class="todo-card">
        <h1>Todo List</h1>
        <div class="input-wrapper">
            <input type="text" id="taskInput" placeholder="Enter Your Task?">
            <!-- <i class="fa-solid fa-calendar-lines-pen"></i> -->
            <button id="okBtn" onclick="addTask()">OK</button>
        </div>
        <ul id="taskList"></ul>
    </div>

    <script src="todoo.js"></script>
</body>
</html>
