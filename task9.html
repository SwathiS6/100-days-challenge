<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        #treasure-chest{
           width: 450px;
           height: 450px;
            background-color: black;
            border: 4px solid rgb(223, 111, 111); 
            cursor: pointer;
            /* width: 450px;
            height: 450px; */
         }
         p{
            display: flex;
            
            justify-content: center;
            align-items: center;
         }
         body{
            border-color: black;
            background-color: blanchedalmond;
         }
        
    </style>
</head>
<body>

    <div id="treasure-chest">
        <p>📦</p>
    </div>

    <script>
        const chest = document.getElementById("treasure-chest");
        chest.onmouseenter = function(e) {
            chest.querySelector('p').textContent = "💎"; 
            e.currentTarget.style.backgroundColor = "gold";
        };

        chest.onmouseleave = function(e) {
            chest.querySelector('p').textContent = "📦";
            e.currentTarget.style.backgroundColor = "black";
        };
    </script>

</body>
</html>
